<!DOCTYPE html>
<html lang="en">
<head>

<title>APEX // BLACKBOX</title>
<link rel="stylesheet" href="apex.css">
</head>
<body>

<header id="bar">

<aside id="rail">

    <div class="nv on" data-view="overview"><i>01</i>Overview</div>
    <div class="nv" data-view="playbook"><i>02</i>Playbook</div>
    <div class="nv" data-view="fleet"><i>03</i>Fleet</div>

    <div class="nv" data-view="calendar"><i>05</i>Calendar</div>

</aside>

<main id="main">

  <section class="view" id="v-fleet"></section>
  <section class="view" id="v-trades"></section>

<script src="apex.js"></script>
