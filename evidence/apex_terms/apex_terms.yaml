# APEX COUNTERPARTY-TERMS CANARY — pinned snapshot of Apex 50K rule constants.
#
# READ-ONLY drift instrumentation. This file does NOT define behavior for any simulator,
# strategy, config, or live limit — it is a snapshot the canary test compares CODE against.
# If code and this file disagree, the canary FAILS and names both values + both locations
# (see test_apex_terms_canary.py). This file is never edited to make a test pass; if a
# real Apex rule changes, the operator updates this file (see apex_terms_review.md), which
# forces a re-certification of every simulator still using the old number.
#
# ABSOLUTE HONESTY: every "apex_rule" entry below is confidence: UNVERIFIED with
# source: PENDING. The repo's own docstrings (apex_funded_40.py, tools_account_size_research.py)
# say these are "help-center-derived — VERIFY against the live contract before relying on the
# $ numbers." No live Apex contract/help-center page has been read to confirm any of these
# values in this task. Do NOT treat source: PENDING as anything other than "not yet verified".
#
# The two "funded_value_placeholder" / "eval_fee_placeholder" entries are separately tagged
# confidence: PLACEHOLDER — these are NOT even claimed to be real Apex numbers; they are a
# stand-in ($8,000 funded-account value, $131 eval fee) used only to produce an E[proxy]
# ranking metric in tools_salvage_track_a.py. Never treat them as authoritative economics.

snapshot_date: "2026-07-07"
pinned_by: "zeus-implementer (task: apex counterparty-terms canary)"
schema_note: >
  Each entry: value (pinned, magnitude-normalized where the codebase uses a signed
  convention), confidence (UNVERIFIED | PLACEHOLDER), source (PENDING for all Apex-rule
  entries; docstring path cited, not a live-contract citation), consumed_by (file:line
  list of the canonical constants this snapshot pins against; not an exhaustive
  every-reference list — see FINDINGS for the wider duplication problem).

