findings:
  duplication:
    summary: >
      These constants are NOT centralized — they are re-declared as independent literals
      in ~10+ files across the repo. A real Apex terms change requires editing every one
      of them; missing any file is silent partial drift (the exact failure mode this
      canary's cross-file consistency check is designed to catch, WARN-only).
    files_with_independent_literals:
      - "apex_12mo_business.py:14,16   SB, TRAIL, LOCK_EOD, FLOOR = 50_000.0, 2_500.0, 52_600.0, 50_100.0 / DAILY_STOP, EXPIRE = -550.0, 30"
      - "apex_6mo_fleet_build.py:12    SB, TRAIL, LOCK_EOD, FLOOR, EXPIRE, DAILY_STOP = 50_000.0, 2_500.0, 52_600.0, 50_100.0, 30, -550.0"
      - "apex_dd_type_compare.py:15    SB, TRAIL, LOCK_EOD, FLOOR, EXPIRE, DAILY_STOP = 50_000.0, 2_500.0, 52_600.0, 50_100.0, 30, -550.0"
      - "apex_fleet_5yr.py:11,13       START, TRAIL, LOCK_EOD, FLOOR = 50_000.0, 2_500.0, 52_600.0, 50_100.0 / DAILY_STOP = -550.0"
      - "apex_fleet_6mo.py:11,13       START, TRAIL, LOCK_EOD, FLOOR = 50_000.0, 2_500.0, 52_600.0, 50_100.0 / DAILY_STOP = -550.0"
      - "_fleet_5yr.py:30              references FR.APEX_ACCOUNTS['50K'] (start 50k, trailing 2500, target 3000) — indirect, via funded_rules.py"
      - "apex_eval_deployed.py:33,34   DAILY_STOP = -550.0 / EXPIRE_DAYS = 30"
      - "apex_eval_eod.py:19,20        EXPIRE_DAYS = 30 / DAILY_STOP = -550.0"
    verified_this_task: >
      As of 2026-07-07, all of the above literals agree with the pinned values in this
      snapshot (spot-checked by direct grep, not by an automated tool — see
      test_apex_terms_canary.py's cross-file WARN check for the ongoing automated version).
      No drift found today; the risk is FUTURE drift when only some files get updated.
  separate_model_do_not_conflate:
    summary: >
      apex_12mo_business.py:15 also defines MINP=500.0, CF=2_000.0, CL=4_000.0 (NC=5) —
      this is a SEPARATE, pre-4.0 MFFU-style funded-payout model ($2k/$4k-forever ladder),
      distinct from the real Apex 4.0 ladder-capped model (LADDER/PAYOUT_FLOOR/MIN_REQ in
      apex_funded_40.py). apex_funded_40.py's own docstring says the pre-4.0 funded sims'
      "$2k/$4k-forever payout model exceeded the real 4.0 lifetime ceiling." Do not pin or
      compare MINP/CF/CL against this canary's Apex-4.0 constants — they belong to a
      different, superseded model that happens to still exist in the same file.
    location: "apex_12mo_business.py:15  SAFETY, CF, CL, NC, MINP = 52_100.0, 2_000.0, 4_000.0, 5, 500.0"
